# This configuration is generated by matugen
# ~/.config/matugen/templates/hyprland/colors.conf
# Changing these variables with matugen still enabled will overwrite them.

general {
    col.active_border = rgba(59596dAA)
    col.inactive_border = rgba(0a0a17AA)
}

misc {
    background_color = rgba(0a0a17FF)
}

plugin {
    hyprbars {
        bar_color = rgba(0a0a17FF)
        col.text = rgba(c1c1c5FF)
        inactive_button_color = rgba(c1c1c5FF)
    }
}

# macos colors
# $COLOR_BAR_CLOSE = rgb(ed6a5f)
# $COLOR_BAR_MAX = rgb(f8b350)
# $COLOR_BAR_MIN = rgb(61c555)

$COLOR_BAR_CLOSE = rgb(eaa99a)
$COLOR_BAR_MAX = rgb(d7b7a9)
$COLOR_BAR_MIN = rgb(8ec3d0)

windowrule = match:pin 1, border_color rgba(eaa99aAA) rgba(eaa99a77)
